replicaCount: 1

image:
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/pharma-notification-service
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

ingress:
  enabled: false
  className: nginx
  host: qa.pharma.internal
  path: /notifications
  pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

livenessProbe:
  path: /health
  port: 3000
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  path: /health/ready
  port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

configmap:
  NODE_ENV: qa
  PORT: "3000"
  LOG_LEVEL: info
  SMTP_HOST: "smtp.pharma.com"
  SMTP_PORT: "587"
  EMAIL_FROM: "noreply-qa@pharma.com"
  DB_HOST: pharma-dev-postgres.cs3c424yurej.us-east-1.rds.amazonaws.com

envFrom:
  - secretRef:
      name: db-credentials

serviceAccount:
  create: true
  annotations: {}
  name: notification-service
