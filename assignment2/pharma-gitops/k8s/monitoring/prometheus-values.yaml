grafana:
  adminPassword: pharma-grafana-2026
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: gp2
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - monitoring.pharma.internal
    paths:
      - /
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
  plugins:
    - grafana-piechart-panel
    - grafana-worldmap-panel

alertmanager:
  enabled: true
  config:
    global:
      smtp_smarthost: "smtp.pharma.com:587"
      smtp_from: "alertmanager@pharma.com"
      smtp_auth_username: "alertmanager@pharma.com"
      smtp_auth_password: "changeme"
    route:
      group_by: ["alertname", "cluster", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "email-notifications"
      routes:
        - match:
            severity: critical
          receiver: "email-notifications"
    receivers:
      - name: "email-notifications"
        email_configs:
          - to: "devops@pharma.com"
            send_resolved: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "18GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
