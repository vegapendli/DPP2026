# Example 2: Multiple Jobs
# Trigger: runs on push OR manually from the GitHub UI
# Teaches: multiple jobs, job dependencies (needs), parallel vs sequential

name: 02 - Multi Job Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Simulate build
        run: |
          echo "Building the application..."
          echo "Build complete!"

  test:
    runs-on: ubuntu-latest
    needs: build        # waits for 'build' job to finish first

    steps:
      - name: Simulate tests
        run: |
          echo "Running tests..."
          echo "All tests passed!"

  deploy:
    runs-on: ubuntu-latest
    needs: test         # waits for 'test' job to finish first

    steps:
      - name: Simulate deploy
        run: |
          echo "Deploying to production..."
          echo "Deploy done! Triggered by: ${{ github.actor }}"
